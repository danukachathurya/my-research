name: roadresq
description: Vehicle damage detection and repair recommendation app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.2

  # HTTP requests
  http: ^1.1.0

  # Image picking
  image_picker: ^1.0.4

  # State management
  provider: ^6.0.5

  # Loading indicators
  flutter_spinkit: ^5.2.0

  # Location services (for garage recommendations)
  geolocator: ^10.1.0
  permission_handler: ^11.0.1

  # URL launcher for maps and phone
  url_launcher: ^6.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.3.5

flutter:
  uses-material-design: true

  # Add assets
  # assets:
  #   - assets/images/
